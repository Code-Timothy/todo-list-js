<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <title>Lista zadań</title>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>Lista zadań</h1>
        </header>
        <main class="main">
            <div class="main__section">
                <form class="form js-form">
                    <legend class="form__legend">Dodaj zadanie</legend>
                    <input class="form__input js-newTask" type="text">
                    <button class="form__button">Dodaj zadanie</button>
                </form>
            </div>
            <div class="main__section">
                <ul class="tasksList js-tasks"></ul>
            </div>
        </main>
    </div>
</body>

</html>
