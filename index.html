<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/container.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/main.css">
    <script defer src="script.js"></script>
    <title>Lista zadań</title>
</head>

<body>
    <div class="container">
        <header class="header">
            <h1 class="header__header">Lista zadań</h1>
        </header>
        <main class="main">
            <div class="main__section">
                <h2 class="main__header">Dodaj nowe zadanie</h2>
                <form class="form js-form">
                    <input class="form__input js-newTask" type="text" placeholder="Co jest do zrobienia?">
                    <button class="form__button">Dodaj zadanie</button>
                </form>
            </div>
            <div class="main__section">
                <h2 class="main__header">Lista zadań</h2>
                <ul class="tasksList js-tasks"></ul>
            </div>
        </main>
    </div>
</body>

</html>
