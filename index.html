<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="images/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/tile.css">
    <link rel="stylesheet" href="css/tasksList.css">
    <script src="js/script.js" defer></script>
    <title>TODO-LIST</title>
</head>

<body>
    <div class="container">
        <h1 class="header">Lista zadań</h1>
        <div class="tile">
            <h2 class="tile__header">Dodaj nowe zadanie</h2>
            <form class="js-form tile__form">
                <input type="text" placeholder="Co jest do zrobienia ?" class="js-newTask tile__input" autofocus>
                <button class="tile__button">Dodaj zadanie</button>
            </form>
        </div>
        <div class="tile">
            <h2 class="tile__header">Lista zadań</h2>
            <ul class="js-tasks tasksList"></ul>
        </div>
    </div>
</body>

</html>
